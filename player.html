<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mascote Sender</title>
</head>

<body style="background:#111;color:#fff;font-family:Arial;text-align:center;padding:40px;">

  <h1>🎤 Fale com o Mascote</h1>

  <input id="msg" placeholder="Digite sua mensagem" style="width:300px;padding:10px;">
  <br><br>

  <button onclick="enviar()" style="padding:10px 20px;">Enviar</button>

  <p id="status"></p>

  <script>
    function enviar() {
      const texto = document.getElementById("msg").value;

      fetch("https://trago-e-gamba-default-rtdb.firebaseio.com/messages.json", {
        method: "POST",
        body: JSON.stringify({
          text: texto,
          status: "pending",
          voice: "default"
        })
      });

      document.getElementById("status").innerText = "Mensagem enviada!";
    }
  </script>

</body>
</html>
